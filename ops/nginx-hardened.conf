# ops/nginx-hardened.conf — drop-in replacement for /etc/nginx/sites-available/new_mafiking
#
# Hardening vs. the previous config:
#   - TLS 1.2 + 1.3 only (TLS 1.0 and 1.1 disabled in nginx.conf via /etc/nginx/conf.d/ssl-params.conf)
#   - HSTS preload, 2 years, includeSubDomains
#   - OCSP stapling
#   - ModSecurity WAF in front (loaded via nginx-mod-http-modsecurity package)
#   - Tightened proxy headers — X-Forwarded-For with original client IP
#   - Security headers defense-in-depth (helmet still owns the response, this is belt + suspenders)
#   - Rate limit zones (defense-in-depth alongside express-rate-limit)
#   - Upstream keepalive pool
#   - Body size already 25m (admin uploads)
#   - Long-lived proxy timeouts preserved for /api/correction streaming
#
# Install:  cp ops/nginx-hardened.conf /etc/nginx/sites-available/new_mafiking
#           nginx -t && systemctl reload nginx

# --- ModSecurity: detection-only by default. Flip to "On" after 7 days of
# review with `tail -f /var/log/modsecurity/audit.log`.
modsecurity on;
modsecurity_rules_file /etc/modsecurity/modsecurity.conf;

# Shared rate-limit zones.
limit_req_zone $binary_remote_addr zone=mafiking_login:10m rate=15r/m;
limit_req_zone $binary_remote_addr zone=mafiking_register:10m rate=4r/m;
limit_req_zone $binary_remote_addr zone=mafiking_correction:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=mafiking_payment:10m rate=8r/m;
limit_req_zone $binary_remote_addr zone=mafiking_perf:10m rate=120r/m;

# Upstream — node app.
upstream mafiking_node {
  server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
  keepalive 16;
}

# --- Redirect HTTP -> HTTPS (HSTS-friendly). ---
server {
  listen 80;
  listen [::]:80;
  server_name mafiking.com www.mafiking.com;

  # Let's Encrypt ACME challenge path.
  location /.well-known/acme-challenge/ {
    root /var/www/html;
  }

  # Permanent redirect; HSTS upgrade will follow on next request.
  location / {
    return 301 https://$host$request_uri;
  }
}

# --- HTTPS. ---
server {
  listen 443 ssl;
  listen [::]:443 ssl;
  http2 on;
  server_name mafiking.com www.mafiking.com;

  # TLS.
  ssl_certificate /etc/letsencrypt/live/mafiking.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/mafiking.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  ssl_stapling on;
  ssl_stapling_verify on;
  resolver 1.1.1.1 8.8.8.8 valid=300s;
  resolver_timeout 5s;

  # Body size for admin uploads.
  client_max_body_size 25m;

  # --- Defense-in-depth security headers (helmet owns these in the app,
  #     but we set them here too in case a path bypasses helmet). ---
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  # CSP is set by the app (helmet) with nonces; do NOT add a duplicate here.

  # --- Per-route rate limits (defense-in-depth). ---
  location ~* ^/api/auth/(login|register) {
    limit_req zone=mafiking_login burst=5 nodelay;
    limit_req_status 429;
    proxy_pass http://mafiking_node;
    include /etc/nginx/proxy_params_hardened.conf;
  }

  location ~* ^/api/correction {
    limit_req zone=mafiking_correction burst=4 nodelay;
    limit_req_status 429;
    proxy_pass http://mafiking_node;
    include /etc/nginx/proxy_params_hardened.conf;
  }

  location ~* ^/api/payment/create {
    limit_req zone=mafiking_payment burst=2 nodelay;
    limit_req_status 429;
    proxy_pass http://mafiking_node;
    include /etc/nginx/proxy_params_hardened.conf;
  }

  location ~* ^/api/performance {
    limit_req zone=mafiking_perf burst=20 nodelay;
    limit_req_status 429;
    proxy_pass http://mafiking_node;
    include /etc/nginx/proxy_params_hardened.conf;
  }

  # --- Default proxy. ---
  location / {
    proxy_pass http://mafiking_node;
    include /etc/nginx/proxy_params_hardened.conf;
  }
}
