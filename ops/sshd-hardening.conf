# ops/sshd-hardening.conf — drop-in for sshd_config.
#
# Installed at /etc/ssh/sshd_config.d/99-mafiking.conf. Merged with the
# system /etc/ssh/sshd_config because sshd_config has `Include /etc/ssh/sshd_config.d/*.conf`
# at the top. First match wins for conflicting directives; this file is named
# 99- so it loads last and overrides defaults.
#
# Covers ASVS V6.2, V14.1, V14.2, V14.3, CIS 5.2.
#
# Pre-reqs:
#   - A non-root user with sudo + SSH key. The 'mafiking-deploy' user
#     is created by ops/provision-deploy-user.sh with NOPASSWD sudo.
#   - Admin must have already placed their pubkey on the server before
#     this drop-in lands, OR keep PasswordAuthentication yes for one
#     login window and disable it after verification.

# CIS 5.2.x — only allow key-based auth.
PasswordAuthentication no
PermitEmptyPasswords no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no

# CIS 5.2.x — disable root login (use sudo).
PermitRootLogin no
LoginGraceTime 30

# CIS 5.2.6, 5.2.7 — disable X11 and TCP forwarding.
X11Forwarding no
AllowTcpForwarding no
AllowAgentForwarding no
PermitUserEnvironment no

# CIS 5.2.12 — only sftp subsystem.
Subsystem sftp internal-sftp

# Auth hardening.
MaxAuthTries 3
MaxSessions 5
PubkeyAuthentication yes
HostbasedAuthentication no
IgnoreRhosts yes

# Crypto — modern curve + FIPS modules where available.
HostKey /etc/ssh/ssh_host_ed25519_key
HostKey /etc/ssh/ssh_host_rsa_key
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,sntrup761x25519-sha512@openssh.com,diffie-hellman-group16-sha512,diffie-hellman-group18-sha512
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes192-ctr,aes128-ctr
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,umac-128-etm@openssh.com

# Logging — see ASVS V7.1.3.
LogLevel VERBOSE

# Idle / connection limits — anti-DoS.
ClientAliveInterval 300
ClientAliveCountMax 2

# Banner.
Banner /etc/issue.net

# Allow only the deploy + ops users; deny everyone else.
# (Adjust the list below to match real usernames.)
AllowGroups ssh-users
