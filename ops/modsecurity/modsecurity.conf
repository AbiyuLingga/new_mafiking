# /etc/modsecurity/modsecurity.conf — Mafiking-tuned.
# Loaded by `modsecurity_rules_file` in nginx-hardened.conf.
#
# Default profile: DetectionOnly. After 7 days of clean logs, switch
# to "On" to block offending requests. The OWASP CRS rules are the
# second line of defense; the app's helmet/CSP/csrf-csrf are the first.

# --- Engine ---
SecRuleEngine DetectionOnly
SecRequestBodyAccess On
SecResponseBodyAccess On
SecResponseBodyMimeType text/plain text/html text/xml application/json
SecResponseBodyLimit 524288
SecRequestBodyLimit 26214400
SecRequestBodyNoFilesLimit 262144

# --- Audit log ---
SecAuditEngine RelevantOnly
SecAuditLogParts ABCDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log
SecAuditLogFormat JSON
SecAuditLogStorageDir /var/log/modsecurity/

# --- Debug ---
SecDebugLogLevel 0

# --- Argument separator ---
SecArgumentSeparator &

# --- Cookies ---
SecCookieFormat 0
SecCookieEncrypt 0

# --- Performance ---
SecRulePerformanceBudget 500

# --- Unicode normalization ---
SecUnicodeMapFile unicode.mapping 20127

# --- Default action ---
SecDefaultAction "phase:1,log,auditlog,pass"
SecDefaultAction "phase:2,log,auditlog,pass"

# --- CRS setup: include OWASP CRS ---
Include /etc/modsecurity/crs/crs-setup.conf
Include /etc/modsecurity/crs/rules/*.conf

# --- Mafiking exclusions: app-specific allow/deny list ---
Include /etc/modsecurity/crs/mafiking-exclusions.conf
