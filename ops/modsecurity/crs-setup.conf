# /etc/modsecurity/crs/crs-setup.conf — Mafiking-tuned CRS 3.3 settings.
# See https://coreruleset.org/docs/CRS/CRS-execution-options/

# Paranoid mode for new projects. Drop to 1 once false positives are gone.
SecAction \
  "id:900000,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.paranoia_level=2"

# Anomaly scoring thresholds.
SecAction \
  "id:900001,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.outbound_anomaly_score_pl1=4,\
   setvar:tx.outbound_anomaly_score_pl2=4,\
   setvar:tx.anomaly_score_pl1=5,\
   setvar:tx.anomaly_score_pl2=4"

# Detection vs blocking — keep in sync with modsecurity.conf SecRuleEngine.
SecAction \
  "id:900002,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.blocking_paranoia=1"

# Allowed HTTP methods.
SecAction \
  "id:900003,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.allowed_methods=GET HEAD POST OPTIONS PUT PATCH DELETE"

# Allowed content types.
SecAction \
  "id:900004,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.allowed_request_content_type=application/x-www-form-urlencoded|multipart/form-data|text/xml|application/xml|application/soap+xml|application/json|application/x-amf|application/octet-stream|text/plain"

# Allowed file extensions (Mafiking is web + admin upload, no .exe etc.).
SecAction \
  "id:900005,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.allowed_request_content_type_charset=utf-8|iso-8859-1|iso-8859-15"

# Max file upload (matches nginx 25m cap).
SecAction \
  "id:900006,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.max_file_size=26214400"
