# /etc/modsecurity/crs/mafiking-exclusions.conf
#
# Mafiking-specific allow/deny rules. These run AFTER the OWASP CRS rules,
# so they can either re-enable a disabled rule (allow) or add a new rule.
#
# Audited: 2026-06-03.

# --- Bypass rules that misfire on the correction endpoint. The body is
# JSON, but the values are LaTeX math, which CRS 942xxx flags as
# injection. Allow only on the correction endpoint, with paranoia 2 cap.
SecRule REQUEST_URI "@beginsWith /api/correction" \
  "id:10001,\
   phase:2,\
   pass,\
   t:none,\
   ctl:ruleRemoveTargetById=942100;ARGS:questionText,\
   ctl:ruleRemoveTargetById=942100;ARGS:expectedAnswer,\
   ctl:ruleRemoveTargetById=942100;ARGS:confirmedAnswerLatex,\
   ctl:ruleRemoveTargetById=942100;ARGS:topicTags,\
   ctl:ruleRemoveTargetById=942260;ARGS:questionText,\
   ctl:ruleRemoveTargetById=942260;ARGS:expectedAnswer,\
   ctl:ruleRemoveTargetById=942260;ARGS:confirmedAnswerLatex"

# --- CSP report endpoint must accept the report-uri POSTs.
SecRule REQUEST_URI "@beginsWith /api/csp-report" \
  "id:10002,\
   phase:1,\
   pass,\
   t:none,\
   ctl:ruleRemoveTargetByTag=CAT_BLOCKING"

# --- Webhooks: svix sends untrusted bodies from Clerk. Allow.
SecRule REQUEST_URI "@beginsWith /api/webhooks/clerk" \
  "id:10003,\
   phase:1,\
   pass,\
   t:none,\
   ctl:ruleRemoveTargetById=920420"

# --- Payment callback from Duitku. Allow.
SecRule REQUEST_URI "@beginsWith /api/payment/callback" \
  "id:10004,\
   phase:1,\
   pass,\
   t:none,\
   ctl:ruleRemoveTargetById=920420,\
   ctl:ruleRemoveTargetById=942100"

# --- Performance vitals beacon. Many false positives here; allow.
SecRule REQUEST_URI "@beginsWith /api/performance" \
  "id:10005,\
   phase:1,\
   pass,\
   t:none,\
   ctl:ruleRemoveTargetById=920420"

# --- Explicit deny: block access to .env / .git / .well-known beyond ACME.
SecRule REQUEST_URI "@rx ^/(?:\.env|\.env\..*|\.git/|node_modules/|package\.json|package-lock\.json|server\.js|server/|scripts/|tests/|ops/)" \
  "id:10010,\
   phase:1,\
   log,\
   auditlog,\
   deny,\
   status:404,\
   t:lowercase,\
   msg:'Direct access to internal file/folder denied',\
   tag:'application:mafiking'"

# --- Block known-bad user agents (long-tail, signature-only).
SecRule REQUEST_HEADERS:User-Agent "@rx (?:sqlmap|nikto|nmap|masscan|zgrab|nuclei|wpscan|acunetix|nessus|qualys|burpsuite|dirbuster|gobuster|feroxbuster)" \
  "id:10011,\
   phase:1,\
   log,\
   auditlog,\
   deny,\
   status:403,\
   t:lowercase,\
   msg:'Scanner user agent blocked',\
   tag:'application:mafiking'"

