# ops/proxy_params_hardened.conf — included by nginx-hardened.conf per location.
#
# This is the production-grade proxy_params used by every Mafiking route.
# Tighter than the stock /etc/nginx/proxy_params.

proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Port $server_port;

# Hints: tell the app the original protocol (helmet/CSP need it).
proxy_set_header X-Forwarded-Ssl on;

# WebSocket upgrade for /api/correction streaming.
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection "upgrade";

# Connection pool reuse.
proxy_set_header Proxy-Connection "keep-alive";

# Anti-hop: don't trust client-supplied Host.
proxy_redirect off;

# Timeouts — long enough for Gemini/Gemma streaming, short enough to
# shed bad clients. Correction can run up to 50s on slow LLM.
proxy_connect_timeout 5s;
proxy_send_timeout    60s;
proxy_read_timeout    60s;

# Buffering — keep responses streaming for SSE-ish endpoints.
proxy_buffering off;
proxy_request_buffering on;
proxy_max_temp_file_size 1024m;

# Hide node from default error pages.
proxy_intercept_errors on;
error_page 502 503 504 /50x.html;
