# /etc/fail2ban/filter.d/mafiking-auth.conf
[Definition]
# Catches Mafiking /api/auth/* failures. The app returns 401 for failed
# login, 403 for CSRF, 429 for rate limit; only 401 / 403 with auth path
# are banned.
failregex = ^<HOST> -[^"]*"(GET|POST) /api/auth/\S+ HTTP/1\.\d" 401
            ^<HOST> -[^"]*"(GET|POST) /api/auth/\S+ HTTP/1\.\d" 403
ignoreregex =
datepattern = \[%%d/%%b/%%Y:%%H:%%M:%%S
