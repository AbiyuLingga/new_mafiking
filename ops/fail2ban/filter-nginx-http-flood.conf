# /etc/fail2ban/filter.d/nginx-http-flood.conf
[Definition]
# Per-IP request flood. Matches 200+ requests/minute from a single IP
# to non-static URLs. The express-rate-limit already returns 429; we
# ban at the edge too.
failregex = ^<HOST> -[^"]*"(GET|POST) (?!/(?:_next|static|favicon)) HTTP/1\.\d"
ignoreregex =
datepattern = \[%%d/%%b/%%Y:%%H:%%M:%%S
