# GitHub Actions workflow for mobile perf invariants.
#
# This runs the Lighthouse CI audit (S2 safeguard) on every PR. The
# thresholds match docs/plans/2026-06-12-002-perf-mobile-perf-incremental-plan.md
# §10.5 (Performance >= 90, A11y >= 95, Best Practices >= 95, SEO >= 95).
#
# The local `npm run perf:audit` script uses the same thresholds but may
# return "inconclusive" in constrained sandboxes; the GitHub runner has a
# real GPU + headless Chrome that paints the SPA reliably.

name: perf-audit

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start server
        run: |
          PORT=3001 node server.js &
          SERVER_PID=$!
          sleep 3
          echo "server-pid=$SERVER_PID" >> $GITHUB_ENV
      - name: Run Lighthouse audit
        run: |
          # Desktop first (more stable for CI), then mobile.
          PERF_AUDIT_MOBILE=0 npm run perf:audit
          npm run perf:audit
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: logs/lighthouse-report.json
      - name: Stop server
        if: always()
        run: |
          if [ -n "$server-pid" ]; then kill $server-pid || true; fi
