<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAFIKING - Beranda Copy</title>
  <meta name="description" content="Copy tampilan Beranda MAFIKING dalam satu file HTML.">
  <style>
    :root {
      --ink: #0b1326;
      --muted: #8b929e;
      --line: #e7eaf0;
      --yellow: #FFF44F;
      --paper: #ffffff;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--paper);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      background: #fff;
      color: var(--ink);
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .page {
      min-height: 100vh;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    .topbar {
      position: relative;
      z-index: 2;
      height: 74px;
      border-bottom: 1px solid rgba(231,234,240,0.72);
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(14px);
    }

    .topbar-inner {
      width: min(100%, 1088px);
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 220px 1fr 250px;
      align-items: center;
      gap: 20px;
      padding: 0 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      color: var(--ink);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .brand img {
      height: 34px;
      width: auto;
      object-fit: contain;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      color: #6f7681;
      font-size: 14px;
      font-weight: 800;
    }

    .nav button {
      min-height: 38px;
      border-radius: 999px;
      background: transparent;
      color: inherit;
      padding: 0 16px;
      transition: background 160ms ease, color 160ms ease, transform 160ms ease;
    }

    .nav button:hover { color: var(--ink); }

    .nav button.active {
      background: var(--ink);
      color: var(--yellow);
      transform: translateY(-1px);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      min-width: 0;
      color: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    .flame {
      width: 22px;
      height: 22px;
      display: grid;
      place-items: center;
      color: #020617;
    }

    .level {
      height: 34px;
      min-width: 132px;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255,255,255,0.88);
      padding: 0 9px;
      box-shadow: 0 8px 18px rgba(15,23,42,0.03);
    }

    .level-badge {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 999px;
      background: var(--yellow);
      color: var(--ink);
      font-size: 10px;
      font-weight: 900;
    }

    .level-track {
      width: 56px;
      height: 4px;
      overflow: hidden;
      border-radius: 999px;
      background: #e5e7eb;
    }

    .level-track i {
      display: block;
      width: 60%;
      height: 100%;
      border-radius: inherit;
      background: var(--ink);
    }

    .level span:last-child {
      color: #a1a8b3;
      font-size: 10px;
      font-weight: 700;
    }

    .profile {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      color: var(--ink);
    }

    .main {
      position: relative;
      z-index: 1;
      width: min(100%, 1088px);
      margin: 0 auto;
      padding: 50px 16px 80px;
    }

    .content {
      max-width: 740px;
    }

    .semester {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 18px;
      color: var(--ink);
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.035em;
    }

    h1 {
      margin: 0 0 46px;
      color: var(--ink);
      font-size: clamp(42px, 5vw, 50px);
      line-height: 1.05;
      letter-spacing: -0.06em;
      font-weight: 950;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 30px;
      margin-bottom: 40px;
      border-bottom: 1px solid rgba(231,234,240,0.92);
      color: #9ca3af;
    }

    .tab {
      position: relative;
      background: transparent;
      color: inherit;
      padding: 0 0 14px;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.035em;
      transition: color 160ms ease;
    }

    .tab:hover { color: #6b7280; }

    .tab.active {
      color: var(--ink);
    }

    .tab.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 1px;
      background: #f59e0b;
    }

    .course-card {
      position: relative;
      overflow: hidden;
      width: 346px;
      min-height: 188px;
      border-radius: 24px;
      background: var(--ink);
      color: #fff;
      padding: 24px;
      box-shadow: 0 24px 55px rgba(15,23,42,0.18);
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .course-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 30px 68px rgba(15,23,42,0.24);
    }

    .card-top {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }

    .tag {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--yellow);
      border-radius: 6px;
      background: var(--yellow);
      color: var(--ink);
      padding: 4px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 900;
    }

    .time {
      height: 32px;
      min-width: 60px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.65);
      padding: 0 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 800;
      white-space: nowrap;
    }

    .time svg {
      width: 12px;
      height: 12px;
    }

    .course-card h2 {
      position: relative;
      z-index: 1;
      margin: 0 0 12px;
      color: #fff;
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.025em;
      font-weight: 950;
    }

    .divider {
      position: relative;
      z-index: 1;
      height: 1px;
      margin: 0 0 16px;
      background: rgba(255,255,255,0.1);
    }

    .card-bottom {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .price {
      color: rgba(255,255,255,0.54);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      letter-spacing: 0.02em;
      font-weight: 850;
    }

    .start-btn {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      background: var(--yellow);
      color: var(--ink);
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 900;
      transition: transform 160ms ease, background 160ms ease;
    }

    .start-btn:hover {
      transform: translateY(-1px);
      background: #fff86a;
    }

    .cards-area {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
      width: min(100%, 1040px);
    }

    .cards-area.is-tryout {
      display: block;
      width: auto;
    }

    .premium-card {
      position: relative;
      min-height: 286px;
      overflow: hidden;
      border: 1.5px solid rgba(11, 19, 38, 0.08);
      border-radius: 24px;
      background: #fff;
      padding: 24px;
      text-align: left;
      color: var(--ink);
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .premium-card::before {
      content: "";
      position: absolute;
      top: 0;
      right: 0;
      width: 240px;
      height: 200px;
      background-image: url('assets/card-bg.png');
      background-repeat: no-repeat;
      background-position: top right;
      background-size: cover;
      pointer-events: none;
      opacity: 0.18;
      mix-blend-mode: multiply;
      z-index: 1;
      transition: opacity 0.3s ease;
    }

    .premium-card:hover {
      transform: translateY(-4px);
    }

    .premium-card:hover::before {
      opacity: 0.28;
    }

    .premium-card.amber {
      background: linear-gradient(140deg, #ffffff 0%, #fffbf0 100%);
      border-color: rgba(245, 158, 11, 0.15);
    }

    .premium-card.amber::before {
      filter: sepia(1) saturate(1.8) hue-rotate(-10deg) brightness(1.1);
    }

    .premium-card.amber:hover {
      box-shadow: 0 20px 40px -15px rgba(245, 158, 11, 0.15);
    }

    .premium-card.blue {
      background: linear-gradient(140deg, #ffffff 0%, #f5f9ff 100%);
      border-color: rgba(37, 99, 235, 0.15);
    }

    .premium-card.blue::before {
      filter: sepia(1) saturate(1.6) hue-rotate(185deg) brightness(1.1);
    }

    .premium-card.blue:hover {
      box-shadow: 0 20px 40px -15px rgba(37, 99, 235, 0.15);
    }

    .premium-card.emerald {
      background: linear-gradient(140deg, #ffffff 0%, #f4fdf7 100%);
      border-color: rgba(16, 185, 129, 0.15);
    }

    .premium-card.emerald::before {
      filter: sepia(1) saturate(1.6) hue-rotate(100deg) brightness(1.05);
    }

    .premium-card.emerald:hover {
      box-shadow: 0 20px 40px -15px rgba(16, 185, 129, 0.15);
    }

    .premium-inner {
      position: relative;
      z-index: 2;
      min-height: 238px;
      display: flex;
      flex-direction: column;
    }

    .premium-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .bab-chip {
      display: inline-flex;
      align-items: center;
      border: 1px solid rgba(11, 19, 38, 0.05);
      border-radius: 6px;
      background: rgba(11, 19, 38, 0.05);
      color: rgba(11, 19, 38, 0.65);
      padding: 4px 10px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 900;
    }

    .est-chip {
      min-width: 60px;
      height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(11, 19, 38, 0.05);
      border-radius: 8px;
      color: rgba(11, 19, 38, 0.6);
      padding: 0 8px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 900;
      animation: pulse-subtle 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    .premium-card h3 {
      margin: 0 0 12px;
      color: var(--ink);
      font-size: 24px;
      line-height: 1.12;
      letter-spacing: -0.025em;
      font-weight: 950;
    }

    .premium-card p {
      margin: 0 0 16px;
      color: rgba(11, 19, 38, 0.55);
      font-size: 12px;
      line-height: 1.65;
      font-weight: 600;
    }

    .topic-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 24px;
    }

    .topic-pill {
      position: relative;
      z-index: 2;
      border: 1px solid rgba(11, 19, 38, 0.12);
      border-radius: 6px;
      background: rgba(11, 19, 38, 0.08);
      color: rgba(11, 19, 38, 0.72);
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 700;
    }

    .premium-footer {
      margin-top: auto;
      padding-top: 16px;
      border-top: 1px solid rgba(11, 19, 38, 0.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .exercise-count {
      color: rgba(11, 19, 38, 0.45);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
      font-weight: 900;
    }

    .premium-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      color: #fff;
      padding: 8px 16px;
      font-size: 12px;
      font-weight: 850;
      box-shadow: 0 4px 12px rgba(11, 19, 38, 0.06);
    }

    .premium-cta.amber { background: #d97706; }
    .premium-cta.blue { background: #2563eb; }
    .premium-cta.emerald { background: #059669; }

    @keyframes pulse-subtle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.72; }
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      z-index: 10;
      transform: translate(-50%, 18px);
      opacity: 0;
      pointer-events: none;
      border-radius: 999px;
      background: rgba(11,18,33,0.94);
      color: #fff;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 800;
      box-shadow: 0 18px 48px rgba(15,23,42,0.25);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    svg {
      display: block;
      width: 18px;
      height: 18px;
    }

    @media (max-width: 900px) {
      .topbar-inner {
        grid-template-columns: 1fr auto;
      }

      .nav {
        order: 3;
        grid-column: 1 / -1;
        justify-content: flex-start;
        overflow-x: auto;
        padding-bottom: 10px;
      }

      .topbar {
        height: auto;
      }

      .topbar-inner {
        padding-block: 14px;
      }

      .status {
        justify-content: flex-end;
      }
    }

    @media (max-width: 640px) {
      .status {
        display: none;
      }

      .topbar-inner {
        grid-template-columns: 1fr;
      }

      .nav {
        gap: 10px;
      }

      .nav button {
        min-height: 34px;
        padding: 0 12px;
      }

      .main {
        padding-top: 36px;
      }

      h1 {
        margin-bottom: 34px;
        font-size: 40px;
      }

      .tabs {
        gap: 20px;
        overflow-x: auto;
      }

      .tab {
        font-size: 18px;
        white-space: nowrap;
      }

      .course-card {
        width: 100%;
      }

      .cards-area {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand" aria-label="MAFIKING">
          <img src="assets/logo.png" alt="">
          <span>MAFIKING</span>
        </div>

        <nav class="nav" aria-label="Navigasi">
          <button class="active" type="button">Beranda</button>
          <button type="button">Misi Harian</button>
          <button type="button">Paket</button>
          <button type="button">Peringkat</button>
        </nav>

        <div class="status" aria-label="Status belajar">
          <span class="flame" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A4.5 4.5 0 0 0 12 22a7 7 0 0 0 7-7c0-4-3-7-5-10-.5 2.5-2 4-4 5.5-1.5 1.1-2 2.4-1.5 4z"></path></svg>
          </span>
          <span>12</span>
          <div class="level">
            <span class="level-badge">L4</span>
            <span class="level-track"><i></i></span>
            <span>60%</span>
          </div>
          <span class="profile" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="8" r="4"></circle><path d="M4 21c0-4 4-7 8-7s8 3 8 7"></path></svg>
          </span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="content" aria-label="Beranda">
        <p class="semester">Semester 1 <span aria-hidden="true" style="color:#9ca3af;font-size:18px;">⌄</span></p>
        <h1>Selamat datang pejuang IP 4.0</h1>

        <div class="tabs" role="tablist" aria-label="Kategori belajar">
          <button class="tab active" type="button" data-tab="tryout">Try Out</button>
          <button class="tab" type="button" data-tab="matematika">Matematika</button>
          <button class="tab" type="button" data-tab="fisika">Fisika</button>
          <button class="tab" type="button" data-tab="kimia">Kimia</button>
        </div>

        <div class="cards-area is-tryout" id="cardsArea" aria-label="Kartu materi"></div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script>
    const tabs = document.querySelectorAll(".tab");
    const cardsArea = document.getElementById("cardsArea");
    const toast = document.getElementById("toast");
    let active = "tryout";
    let toastTimer;
    const chapters = {
      tryout: [
        { kind: "tryout", tag: "Try Out", time: "15 mnt", title: "Tryout pre-test TPB", price: "Gratis" }
      ],
      matematika: [
        { tone: "amber", num: "07", est: "45 mnt", title: "Teknik Integrasi", sub: "Pelajari konsep dasar integral substitusi dan parsial dengan interaktif.", total: 15, topics: ["Substitusi U", "Integral parsial", "Trigonometri"] },
        { tone: "amber", num: "08", est: "60 mnt", title: "Bentuk Tak Tentu & Integral Tak Wajar", sub: "L'Hopital dan konvergensi integral improper.", total: 27, topics: ["L'Hopital", "Integral improper", "Konvergensi"] }
      ],
      fisika: [
        { tone: "blue", num: "01", est: "50 mnt", title: "Kinematika", sub: "Gerak lurus, gerak parabola, dan kerangka acuan.", total: 20, topics: ["GLB", "GLBB", "Parabola"] },
        { tone: "blue", num: "02", est: "55 mnt", title: "Dinamika Newton", sub: "Gaya, hukum Newton, dan gerak melingkar.", total: 22, topics: ["3 Hukum Newton", "Gesek", "Sentripetal"] }
      ],
      kimia: [
        { tone: "emerald", num: "01", est: "40 mnt", title: "Struktur Atom", sub: "Model Bohr dan mekanika kuantum dasar.", total: 12, topics: ["Model Bohr", "Bilangan kuantum"] },
        { tone: "emerald", num: "05", est: "55 mnt", title: "Reaksi Redoks", sub: "Bilangan oksidasi dan sel elektrokimia.", total: 18, topics: ["Oksidasi", "Elektrokimia"] }
      ]
    };

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
    }

    function setActive(key) {
      active = key;
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.tab === key));
      renderCards();
    }

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => setActive(tab.dataset.tab));
    });

    function renderCards() {
      cardsArea.classList.toggle("is-tryout", active === "tryout");
      cardsArea.innerHTML = chapters[active].map((item) => {
        if (item.kind === "tryout") {
          return `
            <article class="course-card" aria-label="Kartu tryout">
              <div class="card-top">
                <span class="tag">${item.tag}</span>
                <span class="time">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="9"></circle><path d="M12 7v5l3 2"></path></svg>
                  <span>${item.time}</span>
                </span>
              </div>
              <h2>${item.title}</h2>
              <div class="divider"></div>
              <div class="card-bottom">
                <span class="price">${item.price}</span>
                <button class="start-btn" type="button" data-open-card="${item.title}">Mulai <span aria-hidden="true">-></span></button>
              </div>
            </article>
          `;
        }
        return `
          <article class="premium-card ${item.tone}" aria-label="${item.title}">
            <div class="premium-inner">
              <div class="premium-top">
                <span class="bab-chip">Bab ${item.num}</span>
                <span class="est-chip">${item.est}</span>
              </div>
              <h3>${item.title}</h3>
              <p>${item.sub}</p>
              <div class="topic-row">${item.topics.map((topic) => `<span class="topic-pill">#${topic}</span>`).join("")}</div>
              <div class="premium-footer">
                <span class="exercise-count">${item.total} soal latihan</span>
                <button class="premium-cta ${item.tone}" type="button" data-open-card="${item.title}">Buka <span aria-hidden="true">-></span></button>
              </div>
            </div>
          </article>
        `;
      }).join("");

      cardsArea.querySelectorAll("[data-open-card]").forEach((button) => {
        button.addEventListener("click", () => showToast(button.dataset.openCard + " siap dibuka."));
      });
    }

    renderCards();
  </script>
</body>
</html>
