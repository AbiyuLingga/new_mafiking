<svg xmlns="http://www.w3.org/2000/svg" width="560" height="380" viewBox="0 0 560 380" role="img" aria-labelledby="title desc">
  <title id="title">Grafik fungsi kuadrat</title>
  <desc id="desc">Parabola y sama dengan x kuadrat dikurangi 4x ditambah 3 dengan titik puncak P di koordinat 2 koma minus 1.</desc>
  <defs>
    <marker id="axis-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#111827"/></marker>
    <marker id="axis-arrow-start" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M10 0 L0 5 L10 10 Z" fill="#111827"/></marker>
  </defs>
  <rect width="560" height="380" rx="22" fill="#ffffff"/>
  <g transform="translate(100 44)">
    <line x1="10" y1="240" x2="410" y2="240" stroke="#111827" stroke-width="2.2" marker-start="url(#axis-arrow-start)" marker-end="url(#axis-arrow)"/>
    <line x1="116" y1="300" x2="116" y2="24" stroke="#111827" stroke-width="2.2" marker-start="url(#axis-arrow-start)" marker-end="url(#axis-arrow)"/>
    <path d="M58 42 C92 184 150 284 226 284 C302 284 360 184 394 42" fill="none" stroke="#111827" stroke-width="2.4"/>
    <circle cx="226" cy="284" r="8" fill="#ff0000"/>
    <text x="248" y="316" font-family="Times New Roman, Times, serif" font-size="28" font-style="italic" fill="#ff0000">P(xp, yp)</text>
    <text x="424" y="251" font-family="Times New Roman, Times, serif" font-size="30" font-style="italic" fill="#000000">x</text>
    <text x="104" y="34" font-family="Times New Roman, Times, serif" font-size="30" font-style="italic" fill="#000000">y</text>
  </g>
</svg>
